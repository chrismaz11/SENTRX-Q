<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}SENTRX-Q{% endblock %}</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --accent: #ff4500;
      --accent2: #7289da;
      --text: #e0e0e0;
      --muted: #888;
      --critical: #e53935;
      --high: #fb8c00;
      --medium: #fdd835;
      --low: #43a047;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
    a { color: var(--accent2); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    header .logo { font-size: 1.25rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
    header nav a { color: var(--text); font-size: 0.9rem; padding: 0.25rem 0.5rem; border-radius: 4px; }
    header nav a:hover, header nav a.active { background: var(--border); }

    .container { max-width: 1200px; margin: 1.5rem auto; padding: 0 1rem; }

    .badge {
      display: inline-block;
      padding: 0.2em 0.55em;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-critical { background: var(--critical); color: #fff; }
    .badge-high     { background: var(--high);     color: #000; }
    .badge-medium   { background: var(--medium);   color: #000; }
    .badge-low      { background: var(--low);      color: #fff; }
    .badge-ai       { background: var(--accent2);  color: #fff; }
    .badge-heuristic{ background: #555;            color: #fff; }
    .badge-error    { background: var(--critical); color: #fff; }

    table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; }
    th, td { padding: 0.65rem 0.85rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.875rem; }
    th { background: var(--border); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.03); }

    .btn { display: inline-block; padding: 0.3em 0.75em; border-radius: 4px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: none; }
    .btn-remove   { background: var(--critical); color: #fff; }
    .btn-approve  { background: var(--low);      color: #fff; }
    .btn-escalate { background: var(--high);      color: #000; }
    .btn:hover { opacity: 0.85; }

    .confidence-bar {
      display: inline-block;
      width: 60px;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      vertical-align: middle;
      position: relative;
    }
    .confidence-bar span {
      display: block;
      height: 100%;
      border-radius: 3px;
      background: var(--accent2);
    }

    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; }
    .stat-card h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--muted); margin-bottom: 0.25rem; }
    .stat-card .value { font-size: 2rem; font-weight: 700; }

    .playtest-banner {
      background: linear-gradient(90deg, #ff4500 0%, #ff6d3a 100%);
      color: #fff;
      padding: 0.5rem 1rem;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .playtest-banner a { color: #fff; text-decoration: underline; }

    h1 { font-size: 1.25rem; margin-bottom: 1rem; }
    .empty { color: var(--muted); padding: 2rem; text-align: center; }
  </style>
</head>
<body>

<div class="playtest-banner">
  🧪 Playtest environment active — monitoring
  <a href="https://www.reddit.com/r/sentrx_q_dev/?playtest=sentrx-q"
     target="_blank" rel="noopener">r/sentrx_q_dev</a>.
  Auto-actions are <strong>{{ 'ENABLED' if cfg.get('triage', {}).get('auto_actions') else 'DISABLED' }}</strong>.
</div>

<header>
  <span class="logo">🛡️ SENTRX-Q</span>
  <nav>
    <a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}class="active"{% endif %}>Queue</a>
    <a href="{{ url_for('stats') }}" {% if request.endpoint == 'stats' %}class="active"{% endif %}>Stats</a>
    <a href="/api/queue" target="_blank">API</a>
  </nav>
</header>

<div class="container">
  {% block content %}{% endblock %}
</div>

</body>
</html>
